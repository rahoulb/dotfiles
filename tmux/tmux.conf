set -g base-index 1

# Terminal features for nvim 0.12 inside tmux 3.6:
#   RGB    — pass 24-bit color through (needed by NvChad's vesper theme)
#   sync   — advertise DEC mode 2026 (synchronized output) so nvim batches
#            frame updates atomically; without this, plugin-heavy nvim tears
#            because tmux paints every partial update individually.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB:sync"
set -as terminal-features ",xterm-ghostty:RGB:sync"
set -as terminal-features ",tmux-256color:RGB:sync"

# Recommended by nvim :checkhealth — lets 'autoread' notice file changes
# when the focused pane changes.
set-option -g focus-events on

set-option -g status on
set-option -g status-bg black
set-option -g status-fg white
set-option -g prefix C-q
# Use a symlink for SSH_AUTH_SOCK (so subsequent SSH sessions work with the SSH Agent) - see ~/.ssh/rc for setting up the socket
set-environment -g 'SSH_AUTH_SOCK' ~/.ssh/ssh_auth_sock

# Allow Shift-Enter
set -g extended-keys on
set -g extended-keys-format csi-u
